# ═══════════════════════════════════════════════════════════════════════════════
# DOCKER COMPOSE - Full Stack Development (INTJ/OCPD: One Command to Rule Them All)
# ═══════════════════════════════════════════════════════════════════════════════
# Usage: docker-compose up -d

services:
  # ─────────────────────────────────────────────────────────────────────────────
  # BACKEND API
  # ─────────────────────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wassistant-api
    ports:
      - '8000:8000'
    environment:
      - ENV=development
      - DATABASE_URL=postgresql://wassistant:wassistant@db:5432/wassistant
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis
    volumes:
      - ./backend:/app/backend:ro
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8000/health']
      interval: 30s
      timeout: 10s
      retries: 3

  # ─────────────────────────────────────────────────────────────────────────────
  # POSTGRESQL DATABASE
  # ─────────────────────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: wassistant-db
    environment:
      POSTGRES_USER: wassistant
      POSTGRES_PASSWORD: wassistant
      POSTGRES_DB: wassistant
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U wassistant']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────────────────────────────────────
  # REDIS CACHE
  # ─────────────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: wassistant-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────────────────────────────────────
  # ADMINER (Database UI)
  # ─────────────────────────────────────────────────────────────────────────────
  adminer:
    image: adminer:latest
    container_name: wassistant-adminer
    ports:
      - '8080:8080'
    depends_on:
      - db
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: wassistant-network
