name: wassistant
description: 'WAssistant: A Flutter project that provides tools for WhatsApp, such as generating QR codes, chat links, and vCards.'
version: 1.4.2+5

environment:
  sdk: ^3.7.2

dependencies:
  # --- Core Framework ---
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # --- Architecture & Functional Programming ---
  get_it: ^7.6.7
  provider: ^6.1.1
  fpdart: ^1.1.0
  equatable: ^2.0.5
  freezed_annotation: ^2.4.1

  # --- Data & Persistence (OCPD Standard) ---
  shared_preferences: ^2.2.2
  path_provider: ^2.1.2
  json_annotation: ^4.8.1
  flutter_dotenv: ^5.1.0
  file_picker: ^8.0.0+1 # Added for Zero-Account Backup

  # --- Firebase Ecosystem ---
  firebase_core: ^3.15.2
  firebase_analytics: ^11.6.0
  firebase_remote_config: ^5.5.0
  firebase_performance: ^0.10.1+10
  firebase_crashlytics: ^4.3.10
  firebase_messaging: ^15.2.10
  firebase_in_app_messaging: ^0.8.1+10

  # --- Security & Hardware ---
  connectivity_plus: ^7.0.0

  # --- Intelligent Features (Strategic Bring Value) ---
  google_mlkit_text_recognition: ^0.13.0 # Re-enabled for OCR
  image_picker: ^1.0.7
  receive_sharing_intent: ^1.8.0

  # --- UI Components ---
  cupertino_icons: ^1.0.6
  font_awesome_flutter: ^10.7.0
  country_code_picker: ^3.0.0
  fl_chart: ^0.66.2
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0
  upgrader: ^10.1.0
  in_app_review: ^2.0.9
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9

  # --- Utilities ---
  intl: ^0.20.2
  logger: ^2.0.0
  timeago: ^3.6.1
  uuid: ^4.3.3
  rxdart: ^0.27.7
  sentry_flutter: ^8.14.2
  phone_numbers_parser: ^8.1.0

  # --- Caching & HTTP ---
  dio: ^5.4.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # --- Functional Modules ---
  google_mobile_ads: ^5.3.1
  url_launcher: ^6.2.5
  share_plus: ^12.0.0
  qr_flutter: ^4.1.0

dev_dependencies:
  # --- Code Quality (OCPD Gates) ---
  flutter_lints: ^3.0.1

  # --- Code Generation ---
  build_runner: ^2.4.8
  json_serializable: ^6.7.1
  freezed: ^2.4.7

  # --- Testing & Coverage ---
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  mockito: ^5.4.4

  # --- Development Tools ---
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.3.10

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/app_icon.png
    - .env

flutter_launcher_icons:
  android: 'launcher_icon'
  ios: true
  image_path: 'assets/app_icon.png'
  min_sdk_android: 21
  remove_alpha_ios: true

flutter_native_splash:
  color: '#050505'
  image: 'assets/app_icon.png'
  android_12:
    image: 'assets/app_icon.png'
    color: '#050505'
  web: false
