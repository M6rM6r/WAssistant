<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page Not Found - Wassistant</title>
    <style>
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background-color: #eceff1;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        color: #455a64;
      }
      .container {
        text-align: center;
        background: white;
        padding: 40px;
        border-radius: 12px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        max-width: 400px;
      }
      h1 {
        color: #075e54;
        font-size: 80px;
        margin: 0;
        line-height: 1;
      }
      h2 {
        margin-top: 10px;
        color: #128c7e;
      }
      p {
        margin: 20px 0 30px;
        color: #78909c;
      }
      .btn {
        display: inline-block;
        background-color: #25d366;
        color: white;
        padding: 12px 24px;
        text-decoration: none;
        border-radius: 24px;
        font-weight: bold;
        transition: background-color 0.3s;
      }
      .btn:hover {
        background-color: #128c7e;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>404</h1>
      <h2>Page Not Found</h2>
      <p>
        The page you are looking for might have been removed, had its name changed, or is
        temporarily unavailable.
      </p>
      <a href="/" class="btn">Go to Home</a>
    </div>
  </body>
</html>
