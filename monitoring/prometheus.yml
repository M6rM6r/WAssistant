# INTJ: Prometheus Monitoring Configuration
# OCPD: Precise metric collection with strategic alerting thresholds

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'wassistant-production'
    replica: '{{.ExternalURL}}'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

# Rule files for alerting
rule_files:
  - /etc/prometheus/rules/*.yml

# Scrape configurations
scrape_configs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Backend API Metrics
  # ─────────────────────────────────────────────────────────────────────────────
  - job_name: 'wassistant-api'
    static_configs:
      - targets: ['api:8000']
    metrics_path: /metrics
    scrape_interval: 10s
    scrape_timeout: 5s
    
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
      - target_label: service
        replacement: api

  # ─────────────────────────────────────────────────────────────────────────────
  # Frontend / Landing Page
  # ─────────────────────────────────────────────────────────────────────────────
  - job_name: 'wassistant-frontend'
    static_configs:
      - targets: ['frontend:80']
    metrics_path: /nginx-status
    scrape_interval: 30s

  # ─────────────────────────────────────────────────────────────────────────────
  # Redis Cache
  # ─────────────────────────────────────────────────────────────────────────────
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']
    scrape_interval: 15s

  # ─────────────────────────────────────────────────────────────────────────────
  # PostgreSQL Database
  # ─────────────────────────────────────────────────────────────────────────────
  - job_name: 'postgresql'
    static_configs:
      - targets: ['postgres-exporter:9187']
    scrape_interval: 30s

  # ─────────────────────────────────────────────────────────────────────────────
  # Node/System Metrics
  # ─────────────────────────────────────────────────────────────────────────────
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
    scrape_interval: 30s

  # ─────────────────────────────────────────────────────────────────────────────
  # Docker Container Metrics
  # ─────────────────────────────────────────────────────────────────────────────
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
    scrape_interval: 15s

  # ─────────────────────────────────────────────────────────────────────────────
  # Self-monitoring
  # ─────────────────────────────────────────────────────────────────────────────
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

# Remote storage for long-term metrics (optional)
# remote_write:
#   - url: https://your-remote-storage/api/v1/write

# Storage configuration
storage:
  tsdb:
    retention.time: 30d
    retention.size: 10GB
    wal-compression: true
