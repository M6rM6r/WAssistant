name: WAssistant CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Setup Java
      uses: actions/setup-java@v3
      with:
        distribution: 'zulu'
        java-version: '11'

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        flutter-version: '3.19.0' # Adjust to match your project

    - name: Install Dependencies
      run: flutter pub get

    - name: Generate Code
      run: dart run build_runner build --delete-conflicting-outputs

    - name: Static Analysis
      run: dart analyze .

    - name: Run Tests
      run: flutter test

    - name: Build APK (Release)
      run: flutter build apk --release --no-pub
