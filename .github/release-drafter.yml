name: Release Drafter
on:
  push:
    branches:
      - main

template: |
  ## What's Changed
  $CHANGES

  ---
  _Generated by Release Drafter_

categories:
  - title: 🚀 Features
    labels:
      - enhancement
      - feature
  - title: 🐛 Fixes
    labels:
      - bug
  - title: 🧰 Chores
    labels:
      - chore
change-template: '* $TITLE (#$NUMBER) by @$AUTHOR'

rules:
  - if: commit.message =~ /BREAKING CHANGE/
    version: major
  - if: commit.message =~ /feat\(/
    version: minor
  - if: commit.message =~ /fix\(/
    version: patch
